theme = "github_dark"

[editor]
bufferline = "multiple"
color-modes = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.whitespace.render]
space = "all"
tab = "all"

[editor.indent-guides]
render = true

[keys.normal]
space.b.b = "buffer_picker"
space.b.d = ":buffer-close"
space.b.o = ":buffer-close-others"
L = "goto_next_buffer"
H = "goto_previous_buffer"
